<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 監視カメラ - 配信側 (90度強制回転コンバート)</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --accent-green: #2ea44f;
    }
    body { background: var(--bg-color); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #30363d; }
    .setup-box { display: flex; gap: 15px; margin-bottom: 15px; text-align: left; background: #21262d; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
    .input-group { flex: 1; min-width: 200px; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #8b949e; }
    input { width: 100%; padding: 8px; border: 1px solid #30363d; background: var(--bg-color); color: #fff; border-radius: 4px; box-sizing: border-box; }
    .status { margin: 15px 0; color: #56d364; font-weight: bold; font-size: 14px; }
    button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: var(--accent-green); color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:disabled { background: #21262d; color: #484f58; border: 1px solid #30363d; cursor: not-allowed; }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 15px;
    }
    video { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🎥 CAMERA PANEL (90° Hardware Rotation)</h2>
    
    <div class="setup-box">
      <div class="input-group">
        <label for="roomId">🔑 部屋番号 (自由な英数字)</label>
        <input type="text" id="roomId" value="my-secret-room-777">
      </div>
      <div class="input-group">
        <label for="roomPassword">🔒 簡易パスワード</label>
        <input type="password" id="roomPassword" placeholder="パスワードを入力">
      </div>
    </div>

    <button id="startBtn" disabled>配信開始（接続待ち受け）</button>
    <div class="status" id="status">カメラの起動を待っています...</div>
    
    <div class="video-wrapper">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhN4EO4f3pOvLOfQGcXsv-778Yvz7HYhg",
      authDomain: "keizibann-b87f9.firebaseapp.com",
      projectId: "keizibann-b87f9",
      storageBucket: "keizibann-b87f9.firebasestorage.app",
      messagingSenderId: "209559761940",
      appId: "1:209559761940:web:fee2e2aaa7e3a69525e301",
      measurementId: "G-6CLFWZ1Y2W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const peerConfiguration = {
      iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
    };

    let rawStream = null;
    let processedStream = null;
    let peerConnection = null;

    const localVideo = document.getElementById('localVideo');
    const statusText = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    // 縦型映像を掴んだ場合、右に90度回転させて16:9に収めるリアルタイム変換処理
    function createRotated169Stream(videoElement) {
      const canvas = document.createElement('canvas');
      // 出力は絶対に横長の 16:9 (1280x720)
      canvas.width = 1280;
      canvas.height = 720;
      const ctx = canvas.getContext('2d');

      function draw() {
        if (!videoElement.paused && !videoElement.ended) {
          ctx.fillStyle = "#000000";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const vWidth = videoElement.videoWidth;
          const vHeight = videoElement.videoHeight;

          ctx.save();
          
          if (vHeight > vWidth) {
            // 【映像が縦長（9:16）の場合】
            // キャンバスの中心に原点を移動
            ctx.translate(canvas.width / 2, canvas.height / 2);
            // 時計回りに90度回転
            ctx.rotate(90 * Math.PI / 180);
            
            // 回転後の縦横比率を計算して、1280x720の画面にぴったりフィットさせる
            // 縦長映像の高さ(vHeight)が、横長画面の幅(1280)に対応するよう拡縮
            const scale = canvas.width / vHeight;
            const drawWidth = vWidth * scale;
            const drawHeight = vHeight * scale;

            // 中心が揃うようにずらして描画
            ctx.drawImage(videoElement, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
          } else {
            // 【映像が最初から横長（16:9）の場合】
            // 通常通りそのまま描画
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
          }
          
          ctx.restore();
        }
        requestAnimationFrame(draw);
      }
      
      videoElement.addEventListener('play', () => {
        draw();
      });

      // キャンバスから高画質なストリームを生成（24fps）
      return canvas.captureStream(24);
    }

    async function initCamera() {
      try {
        const constraints = {
          video: { facingMode: { ideal: "environment" } },
          audio: true
        };
        
        rawStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        // バックグラウンドで再生するための隠しvideo要素
        const hiddenVideo = document.createElement('video');
        hiddenVideo.srcObject = rawStream;
        hiddenVideo.muted = true;
        hiddenVideo.playsInline = true;
        await hiddenVideo.play();

        // 90度回転＆16:9変換処理を実行
        processedStream = createRotated169Stream(hiddenVideo);
        
        // マイク音声トラックがあれば合成
        rawStream.getAudioTracks().forEach(track => {
          processedStream.addTrack(track);
        });

        // 配信側パネルのプレビューに変換後の映像をセット
        localVideo.srcObject = processedStream;
        
        statusText.innerText = "カメラ回転システム起動完了。配信を開始してください。";
        startBtn.disabled = false;
      } catch (e) {
        statusText.innerText = "カメラの取得に失敗: " + e.message;
      }
    }

    async function startBroadcasting() {
      const roomId = document.getElementById('roomId').value.trim();
      const password = document.getElementById('roomPassword').value.trim();

      if (!roomId || !password) {
        alert("部屋番号とパスワードを両方入力してください！");
        return;
      }

      statusText.innerText = "シグナリング初期化中...";
      startBtn.disabled = true;

      const roomRef = doc(db, 'rooms', roomId);
      await deleteDoc(roomRef).catch(() => {});

      peerConnection = new RTCPeerConnection(peerConfiguration);

      // 強制変換したストリームのトラックをWebRTC経由で送信
      processedStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, processedStream);
      });

      const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          addDoc(callerCandidatesCollection, event.candidate.toJSON());
        }
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      const roomWithOffer = {
        password: password,
        offer: { type: offer.type, sdp: offer.sdp }
      };
      await setDoc(roomRef, roomWithOffer);
      statusText.innerText = `部屋「${roomId}」を開放しました。ビューアーから接続してください。`;

      onSnapshot(roomRef, async snapshot => {
        const data = snapshot.data();
        if (!peerConnection.currentRemoteDescription && data && data.answer) {
          statusText.innerText = "⚡ ビューアーが接続しました！ストリーミング中...";
          const rtcAnswerDescription = new RTCSessionDescription(data.answer);
          await peerConnection.setRemoteDescription(rtcAnswerDescription);
        }
      });

      onSnapshot(collection(roomRef, 'calleeCandidates'), snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') {
            let data = change.doc.data();
            await peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
    }

    window.addEventListener('DOMContentLoaded', initCamera);
    startBtn.addEventListener('click', startBroadcasting);
  </script>
</body>
</html>
