<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 監視カメラ - 配信側 (16:9強制)</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --accent-green: #2ea44f;
    }
    body { background: var(--bg-color); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #30363d; }
    .setup-box { display: flex; gap: 15px; margin-bottom: 15px; text-align: left; background: #21262d; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
    .input-group { flex: 1; min-width: 200px; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #8b949e; }
    input { width: 100%; padding: 8px; border: 1px solid #30363d; background: var(--bg-color); color: #fff; border-radius: 4px; box-sizing: border-box; }
    .status { margin: 15px 0; color: #56d364; font-weight: bold; font-size: 14px; }
    button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: var(--accent-green); color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:disabled { background: #21262d; color: #484f58; border: 1px solid #30363d; cursor: not-allowed; }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 15px;
    }
    video { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🎥 CAMERA BROADCAST PANEL (16:9 Landscape)</h2>
    
    <div class="setup-box">
      <div class="input-group">
        <label for="roomId">🔑 部屋番号 (自由な英数字)</label>
        <input type="text" id="roomId" value="my-secret-room-777">
      </div>
      <div class="input-group">
        <label for="roomPassword">🔒 簡易パスワード</label>
        <input type="password" id="roomPassword" placeholder="パスワードを入力">
      </div>
    </div>

    <button id="startBtn" disabled>配信開始（接続待ち受け）</button>
    <div class="status" id="status">カメラの起動を待っています...</div>
    
    <div class="video-wrapper">
      <video id="localVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhN4EO4f3pOvLOfQGcXsv-778Yvz7HYhg",
      authDomain: "keizibann-b87f9.firebaseapp.com",
      projectId: "keizibann-b87f9",
      storageBucket: "keizibann-b87f9.firebasestorage.app",
      messagingSenderId: "209559761940",
      appId: "1:209559761940:web:fee2e2aaa7e3a69525e301",
      measurementId: "G-6CLFWZ1Y2W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const peerConfiguration = {
      iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
    };

    let localStream = null;
    let peerConnection = null;

    const localVideo = document.getElementById('localVideo');
    const statusText = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    async function initCamera() {
      try {
        // 【重要】解像度を「横向き16:9」に完全にロックする（exact指定）
        const constraints = {
          video: { 
            facingMode: { ideal: "environment" }, // アウトカメラを優先
            width: { exact: 1280 },               // 1280ピクセル固定
            height: { exact: 720 },               // 720ピクセル固定
            aspectRatio: { exact: 1.7777777778 }  // 16:9アスペクト比固定
          },
          audio: true
        };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        localVideo.srcObject = localStream;
        statusText.innerText = "外カメラ準備完了（16:9横向き強制）。設定して配信を開始してください。";
        startBtn.disabled = false;
      } catch (e) {
        console.warn("厳格な16:9固定に失敗しました。標準モードで再試行します: ", e.message);
        // 万が一、古いスマホなどで「exact」が原因で起動しなかった場合のセーフティ
        try {
          const fallbackConstraints = {
            video: { 
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 }, 
              height: { ideal: 720 }, 
              aspectRatio: 1.7777777778 
            },
            audio: true
          };
          localStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
          localVideo.srcObject = localStream;
          statusText.innerText = "外カメラ準備完了（標準互換モード）。";
          startBtn.disabled = false;
        } catch (err) {
          statusText.innerText = "カメラの取得に失敗しました: " + err.message;
        }
      }
    }

    async function startBroadcasting() {
      const roomId = document.getElementById('roomId').value.trim();
      const password = document.getElementById('roomPassword').value.trim();

      if (!roomId || !password) {
        alert("部屋番号とパスワードを両方入力してください！");
        return;
      }

      statusText.innerText = "シグナリング初期化中...";
      startBtn.disabled = true;

      const roomRef = doc(db, 'rooms', roomId);
      await deleteDoc(roomRef).catch(() => {});

      peerConnection = new RTCPeerConnection(peerConfiguration);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          addDoc(callerCandidatesCollection, event.candidate.toJSON());
        }
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      const roomWithOffer = {
        password: password,
        offer: { type: offer.type, sdp: offer.sdp }
      };
      await setDoc(roomRef, roomWithOffer);
      statusText.innerText = `部屋「${roomId}」を開放しました。ビューアーから接続してください。`;

      onSnapshot(roomRef, async snapshot => {
        const data = snapshot.data();
        if (!peerConnection.currentRemoteDescription && data && data.answer) {
          statusText.innerText = "⚡ ビューアーが接続しました！ストリーミング中...";
          const rtcAnswerDescription = new RTCSessionDescription(data.answer);
          await peerConnection.setRemoteDescription(rtcAnswerDescription);
        }
      });

      onSnapshot(collection(roomRef, 'calleeCandidates'), snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') {
            let data = change.doc.data();
            await peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
    }

    window.addEventListener('DOMContentLoaded', initCamera);
    startBtn.addEventListener('click', startBroadcasting);
  </script>
</body>
</html>
