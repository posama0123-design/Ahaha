<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 監視カメラ - 配信側</title>
  <style>
    body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
    .container { max-width: 640px; margin: 0 auto; background: #222; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    video { width: 100%; border: 2px solid #333; border-radius: 8px; background: #000; margin-top: 15px; }
    .setup-box { margin-bottom: 20px; text-align: left; background: #333; padding: 15px; border-radius: 8px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #444; background: #111; color: #fff; border-radius: 4px; box-sizing: border-box; }
    .status { margin: 15px 0; color: #0f0; font-weight: bold; min-height: 24px; }
    button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🏠 監視カメラ（配信設定）</h2>
    
    <div class="setup-box">
      <label for="roomId">🔑 部屋番号 (自由な英数字)</label>
      <input type="text" id="roomId" value="my-secret-room-777" placeholder="例: living-room-xyz">

      <label for="roomPassword">🔒 簡易パスワード</label>
      <input type="password" id="roomPassword" value="" placeholder="ここにパスワードを入力">
    </div>

    <button id="startBtn" disabled>配信開始（接続待ち）</button>
    <div class="status" id="status">カメラの起動を待っています...</div>
    
    <video id="localVideo" autoplay playsinline muted></video>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhN4EO4f3pOvLOfQGcXsv-778Yvz7HYhg",
      authDomain: "keizibann-b87f9.firebaseapp.com",
      projectId: "keizibann-b87f9",
      storageBucket: "keizibann-b87f9.firebasestorage.app",
      messagingSenderId: "209559761940",
      appId: "1:209559761940:web:fee2e2aaa7e3a69525e301",
      measurementId: "G-6CLFWZ1Y2W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const peerConfiguration = {
      iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
    };

    let localStream = null;
    let peerConnection = null;

    const localVideo = document.getElementById('localVideo');
    const statusText = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');

    // カメラ起動
    async function initCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        statusText.innerText = "カメラ準備完了。部屋番号とパスワードを設定して配信を開始してください。";
        startBtn.disabled = false;
      } catch (e) {
        statusText.innerText = "カメラの取得に失敗: " + e.message;
      }
    }

    // 配信開始処理
    async function startBroadcasting() {
      const roomId = document.getElementById('roomId').value.trim();
      const password = document.getElementById('roomPassword').value.trim();

      if (!roomId || !password) {
        alert("部屋番号とパスワードを両方入力してください！");
        return;
      }

      statusText.innerText = "シグナリングサーバーに接続中...";
      startBtn.disabled = true;

      const roomRef = doc(db, 'rooms', roomId);
      
      // 古いデータが残っていたら削除（部屋の初期化）
      await deleteDoc(roomRef);

      peerConnection = new RTCPeerConnection(peerConfiguration);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          addDoc(callerCandidatesCollection, event.candidate.toJSON());
        }
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      // Offerと一緒に、設定したパスワードも暗号化せずそのままFirebaseに保存
      const roomWithOffer = {
        password: password, 
        offer: {
          type: offer.type,
          sdp: offer.sdp
        }
      };
      await setDoc(roomRef, roomWithOffer);
      statusText.innerText = `部屋「${roomId}」で待機中... ビューアーで接続してください。`;

      // 相手からのAnswer（応答）を待つ
      onSnapshot(roomRef, async snapshot => {
        const data = snapshot.data();
        if (!peerConnection.currentRemoteDescription && data && data.answer) {
          statusText.innerText = "ビューアーが接続しました！映像配信中...";
          const rtcAnswerDescription = new RTCSessionDescription(data.answer);
          await peerConnection.setRemoteDescription(rtcAnswerDescription);
        }
      });

      // 相手からのICE接続候補を監視
      onSnapshot(collection(roomRef, 'calleeCandidates'), snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') {
            let data = change.doc.data();
            await peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
    }

    window.addEventListener('DOMContentLoaded', initCamera);
    startBtn.addEventListener('click', startBroadcasting);
  </script>
</body>
</html>
