<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📱 監視カメラ - ビューアー (ミュート機能付き)</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --accent-cyan: #00ecff;
      --accent-red: #ff7b72;
    }

    body { background: var(--bg-color); color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #30363d; }
    .setup-box { display: flex; gap: 15px; margin-bottom: 15px; text-align: left; background: #21262d; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
    .input-group { flex: 1; min-width: 200px; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #8b949e; }
    input { width: 100%; padding: 8px; border: 1px solid #30363d; background: var(--bg-color); color: #fff; border-radius: 4px; box-sizing: border-box; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    button { flex: 1; min-width: 120px; padding: 12px; font-size: 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s, color 0.2s; }
    
    #joinBtn { background: #238636; color: white; }
    #joinBtn:hover { background: #2ea44f; }
    
    /* ミュートボタンのスタイル */
    #muteBtn { background: #c9d1d9; color: #0d1117; display: none; }
    #muteBtn.muted { background: var(--accent-red); color: white; }
    
    #fullscreenBtn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; display: none; }
    #fullscreenBtn:hover { background: #30363d; }
    button:disabled { background: #21262d !important; color: #484f58 !important; border: 1px solid #30363d; cursor: not-allowed; }

    .status { margin-bottom: 15px; color: var(--accent-cyan); font-size: 14px; font-weight: bold; }
    
    /* 16:9 モニターエリア */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 2px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 236, 255, 0.1);
    }
    video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }

    .rec-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.6);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      pointer-events: none;
    }
    .rec-dot { width: 10px; height: 10px; background: var(--accent-red); border-radius: 50%; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    video::-webkit-media-controls { display:none !important; }
  </style>
</head>
<body>

  <div class="container">
    <h2>📱 LIVE MONITOR PANEL</h2>
    
    <div class="setup-box">
      <div class="input-group">
        <label for="roomId">🔑 接続する部屋番号</label>
        <input type="text" id="roomId" value="my-secret-room-777">
      </div>
      <div class="input-group">
        <label for="roomPassword">🔒 パスワード</label>
        <input type="password" id="roomPassword" placeholder="パスワードを入力">
      </div>
    </div>

    <div class="controls">
      <button id="joinBtn">カメラに接続する</button>
      <button id="muteBtn">🔊 音声をミュート</button>
      <button id="fullscreenBtn">🖥️ 全画面表示</button>
    </div>

    <div class="status" id="status">部屋番号とパスワードを入力してください。</div>
    
    <div class="video-wrapper" id="videoWrapper">
      <div class="rec-overlay" id="recOverlay">
        <div class="rec-dot"></div>
        <span>LIVE</span>
      </div>
      <video id="remoteVideo" autoplay playsinline title="ダブルクリックで全画面切り替え"></video>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhN4EO4f3pOvLOfQGcXsv-778Yvz7HYhg",
      authDomain: "keizibann-b87f9.firebaseapp.com",
      projectId: "keizibann-b87f9",
      storageBucket: "keizibann-b87f9.firebasestorage.app",
      messagingSenderId: "209559761940",
      appId: "1:209559761940:web:fee2e2aaa7e3a69525e301",
      measurementId: "G-6CLFWZ1Y2W"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const peerConfiguration = {
      iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
    };

    let peerConnection = null;
    let remoteStream = null;

    const remoteVideo = document.getElementById('remoteVideo');
    const videoWrapper = document.getElementById('videoWrapper');
    const statusText = document.getElementById('status');
    const joinBtn = document.getElementById('joinBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const recOverlay = document.getElementById('recOverlay');

    async function joinRoom() {
      const roomId = document.getElementById('roomId').value.trim();
      const inputPassword = document.getElementById('roomPassword').value.trim();

      if (!roomId || !inputPassword) {
        alert("部屋番号とパスワードを入力してください！");
        return;
      }

      statusText.innerText = "認証中...";
      joinBtn.disabled = true;

      const roomRef = doc(db, 'rooms', roomId);
      const roomSnapshot = await getDoc(roomRef);

      if (!roomSnapshot.exists()) {
        statusText.innerText = "エラー: 部屋が見つかりません。配信を先に開始してください。";
        joinBtn.disabled = false;
        return;
      }

      const roomData = roomSnapshot.data();

      if (roomData.password !== inputPassword) {
        statusText.innerText = "❌ パスワードが一致しません！";
        joinBtn.disabled = false;
        return;
      }

      statusText.innerText = "接続を確立中...";

      peerConnection = new RTCPeerConnection(peerConfiguration);
      remoteStream = new MediaStream();
      remoteVideo.srcObject = remoteStream;

      peerConnection.ontrack = event => {
        event.streams[0].getTracks().forEach(track => {
          remoteStream.addTrack(track);
        });
        statusText.innerText = "⚡ ライブ映像を受信中";
        recOverlay.style.display = "flex";
        muteBtn.style.display = "block"; // 接続成功時に表示
        fullscreenBtn.style.display = "block";
      };

      const calleeCandidatesCollection = collection(roomRef, 'calleeCandidates');
      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          addDoc(calleeCandidatesCollection, event.candidate.toJSON());
        }
      };

      const offer = roomData.offer;
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);

      const roomWithAnswer = {
        answer: { type: answer.type, sdp: answer.sdp }
      };
      await setDoc(roomRef, roomWithAnswer, { merge: true });

      onSnapshot(collection(roomRef, 'callerCandidates'), snapshot => {
        snapshot.docChanges().forEach(async change => {
          if (change.type === 'added') {
            const data = change.doc.data();
            await peerConnection.addIceCandidate(new RTCIceCandidate(data));
          }
        });
      });
    }

    // ミュート切り替え関数
    function toggleMute() {
      if (remoteVideo.muted) {
        remoteVideo.muted = false;
        muteBtn.innerText = "🔊 音声をミュート";
        muteBtn.classList.remove('muted');
      } else {
        remoteVideo.muted = true;
        muteBtn.innerText = "🔇 ミュート解除";
        muteBtn.classList.add('muted');
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        videoWrapper.requestFullscreen().catch(err => {
          alert(`全画面エラー: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    joinBtn.addEventListener('click', joinRoom);
    muteBtn.addEventListener('click', toggleMute);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    remoteVideo.addEventListener('dblclick', toggleFullscreen);
  </script>
</body>
</html>
